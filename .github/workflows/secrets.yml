# PRD-SEC-03: Secret scanning con Gitleaks
# Corre en push y PR para detectar credenciales, tokens y PII en el código fuente.
# Usa el binario oficial de gitleaks directamente (sin la GitHub Action, que requiere
# licencia para cuentas de organización). Se fija versión específica de gitleaks.
# No imprime contenido de secretos encontrados: solo ruta, regla y línea redactada.
name: Secret scanning

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.30.1"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --no-git \
            --verbose 2>&1 | head -200
        env:
          # Gitleaks redacta valores encontrados por defecto en output.
          # No se imprime contenido de secretos, solo ruta, regla y línea redactada.
          GITLEAKS_NO_COLOR: "true"
