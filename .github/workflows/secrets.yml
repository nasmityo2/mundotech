name: Secret scanning
on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.30.1"
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          DOWNLOAD_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ARCHIVE}"
          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            "$DOWNLOAD_URL" \
            --output "/tmp/$ARCHIVE"
          tar \
            --extract \
            --gzip \
            --file "/tmp/$ARCHIVE" \
            --directory /usr/local/bin \
            gitleaks
          gitleaks version

      - name: Run Gitleaks
        shell: bash
        env:
          GITLEAKS_NO_COLOR: "true"
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose
