name: Secret scanning
on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        env:
          GITLEAKS_CHECKSUM: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.30.1"
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          DOWNLOAD_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ARCHIVE}"
          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            "$DOWNLOAD_URL" \
            --output "/tmp/$ARCHIVE"
          # Verificar checksum SHA-256 antes de extraer
          echo "${GITLEAKS_CHECKSUM}  /tmp/${ARCHIVE}" | sha256sum --check --status
          tar \
            --extract \
            --gzip \
            --file "/tmp/$ARCHIVE" \
            --directory /usr/local/bin \
            gitleaks
          gitleaks version

      - name: Run Gitleaks
        shell: bash
        env:
          GITLEAKS_NO_COLOR: "true"
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose
